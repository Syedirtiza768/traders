# Production Overrides for Docker Compose
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: "3.8"

services:
  backend:
    restart: always
    environment:
      - FRAPPE_ENV=production
    deploy:
      resources:
        limits:
          memory: 2G

  db:
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G

  redis-cache:
    restart: always

  redis-queue:
    restart: always

  worker-short:
    restart: always

  worker-long:
    restart: always

  worker-default:
    restart: always

  scheduler:
    restart: always

  frontend:
    restart: always

  proxy:
    restart: always
    # In production, you would mount SSL certs here
    # volumes:
    #   - /etc/letsencrypt:/etc/letsencrypt:ro
    #   - ../infra/nginx/proxy-ssl.conf:/etc/nginx/conf.d/default.conf:ro
