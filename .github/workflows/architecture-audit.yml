name: Architecture Audit

on:
  pull_request:
    paths:
      - 'frontend/trader-ui/src/App.tsx'
      - 'frontend/trader-ui/src/pages/**'
      - 'frontend/trader-ui/src/components/Sidebar.tsx'
      - 'frontend/trader-ui/src/components/Navbar.tsx'
      - 'frontend/trader-ui/src/layouts/**'
      - 'frontend/trader-ui/src/lib/api.ts'
      - 'frontend/trader-ui/src/stores/**'
      - 'apps/trader_app/trader_app/api/**'
      - 'apps/trader_app/trader_app/hooks.py'
      - 'apps/trader_app/trader_app/setup/**'
  push:
    branches: [main]
    paths:
      - 'frontend/trader-ui/src/App.tsx'
      - 'frontend/trader-ui/src/pages/**'
      - 'frontend/trader-ui/src/components/Sidebar.tsx'
      - 'frontend/trader-ui/src/components/Navbar.tsx'
      - 'frontend/trader-ui/src/layouts/**'
      - 'frontend/trader-ui/src/lib/api.ts'
      - 'frontend/trader-ui/src/stores/**'
      - 'apps/trader_app/trader_app/api/**'
      - 'apps/trader_app/trader_app/hooks.py'
      - 'apps/trader_app/trader_app/setup/**'
  workflow_dispatch:
    inputs:
      audit_scope:
        description: 'Audit scope'
        required: false
        default: '--full'
        type: choice
        options:
          - '--full'
          - '--frontend'
          - '--backend'
          - '--workflows'
          - '--graphs'

permissions:
  contents: write
  pull-requests: write

jobs:
  architecture-audit:
    name: Run Architecture Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine audit scope
        id: scope
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "scope=${{ github.event.inputs.audit_scope }}" >> $GITHUB_OUTPUT
          else
            echo "scope=--full" >> $GITHUB_OUTPUT
          fi

      - name: Run architecture audit
        run: node scripts/architecture-audit/run-audit.mjs ${{ steps.scope.outputs.scope }}

      - name: Check for doc changes
        id: changes
        run: |
          git diff --name-only docs/ > /tmp/changed_docs.txt
          if [ -s /tmp/changed_docs.txt ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "### 📋 Architecture Docs Updated" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following documentation files were refreshed:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/changed_docs.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "### ✅ Architecture Docs Up To Date" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "No documentation changes needed." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Commit updated docs (push to main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git commit -m "docs: refresh architecture audit [automated]"
          git push

      - name: Comment on PR (pull_request only)
        if: github.event_name == 'pull_request' && steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changedDocs = fs.readFileSync('/tmp/changed_docs.txt', 'utf-8').trim();

            const body = `## 📋 Architecture Audit Report

            The following architecture documentation needs to be updated based on changes in this PR:

            \`\`\`
            ${changedDocs}
            \`\`\`

            **Action required:** Please run \`npm run audit:architecture\` and commit the updated docs, or the architecture audit CI will update them on merge.

            > Auto-generated by the Architecture Audit workflow.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

  check-docs-freshness:
    name: Check Architecture Doc Freshness
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if structural files changed without docs update
        run: |
          STRUCTURAL_CHANGED=$(git diff --name-only origin/main...HEAD | grep -E '(frontend/trader-ui/src/(App|pages|components/Sidebar|components/Navbar|layouts|lib/api|stores)/|apps/trader_app/trader_app/(api|hooks|setup)/)' || true)
          DOCS_CHANGED=$(git diff --name-only origin/main...HEAD | grep -E '^docs/' || true)

          if [ -n "$STRUCTURAL_CHANGED" ] && [ -z "$DOCS_CHANGED" ]; then
            echo "::warning::Structural files were modified but no /docs files were updated. Architecture documentation may be stale."
            echo "### ⚠️ Architecture Documentation May Be Stale" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Structural files were modified:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$STRUCTURAL_CHANGED" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "But no \`/docs\` files were updated. Run \`npm run audit:architecture\` to refresh." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Documentation Check Passed" >> $GITHUB_STEP_SUMMARY
          fi
