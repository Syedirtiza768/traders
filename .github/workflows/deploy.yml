name: CD — Deploy

on:
  workflow_run:
    workflows: ["CI — Build & Test"]
    types: [completed]
    branches: [main]

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_backup:
        description: 'Skip pre-deploy backup'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/trader

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Deploy to Target Environment
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      url: ${{ vars.DEPLOY_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          SKIP_BACKUP: ${{ github.event.inputs.skip_backup || 'false' }}
        run: |
          ssh ${DEPLOY_USER}@${DEPLOY_HOST} << 'DEPLOY_SCRIPT'
            set -euo pipefail

            cd ${DEPLOY_PATH:-/opt/trader}

            echo "📥 Pulling latest changes..."
            git pull origin main

            echo "🔨 Rebuilding Docker images..."
            cd compose
            docker compose pull 2>/dev/null || true
            docker compose build

            if [ "${SKIP_BACKUP}" != "true" ]; then
              echo "💾 Creating pre-deploy backup..."
              bash ../scripts/backup.sh || echo "⚠️ Backup warning (continuing)"
            fi

            echo "🚀 Rolling out new containers..."
            docker compose down --remove-orphans
            docker compose up -d

            echo "⏳ Waiting for services..."
            sleep 30

            echo "🔄 Running migrations..."
            docker compose exec -T backend bench --site ${SITE_NAME:-trader.localhost} migrate || true
            docker compose exec -T backend bench --site ${SITE_NAME:-trader.localhost} clear-cache || true

            echo "✅ Deployment complete!"
            docker compose ps
          DEPLOY_SCRIPT

      - name: Health Check
        env:
          DEPLOY_URL: ${{ vars.DEPLOY_URL }}
        run: |
          echo "Running health check against $DEPLOY_URL ..."
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${DEPLOY_URL}/api/method/ping" 2>/dev/null || echo "000")
            if [ "$status" = "200" ]; then
              echo "✅ Health check passed (HTTP 200)"
              exit 0
            fi
            echo "  Attempt $i: HTTP $status, retrying in 10s..."
            sleep 10
          done
          echo "⚠️ Health check did not return 200 — please verify manually."
          exit 1

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ github.event.inputs.environment || "staging" }}';
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Deployment failed: ${env}`,
              body: `Deployment to **${env}** failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['deployment', 'bug'],
            });
