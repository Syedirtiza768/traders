# Nginx SSL Reverse Proxy Configuration
# Place in /etc/nginx/sites-available/trader.conf

upstream trader_backend {
    server localhost:8080;
}

server {
    listen 80;
    server_name trader.yourcompany.com;
    
    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name trader.yourcompany.com;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/trader.yourcompany.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trader.yourcompany.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/trader_access.log;
    error_log /var/log/nginx/trader_error.log;

    # Max upload size (for file attachments)
    client_max_body_size 50M;

    location / {
        proxy_pass http://trader_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
